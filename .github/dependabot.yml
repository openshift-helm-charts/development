version: 2
updates:
  - package-ecosystem: pip
    groups:
      core-scripts:
        applies-to: "version-updates"
        patterns:
          - "*"
    directory: "/scripts"
    schedule:
      interval: "monthly"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      groups:
        core-workflows:
          applies-to: "version-updates"
          patterns:
            - "*"